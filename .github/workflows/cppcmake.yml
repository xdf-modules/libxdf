name: C/C++ CI

on:
  push:
    branches:
      - main
    tags:
      - v*.*
  pull_request:
    branches:
      - main

jobs:
  build:
    name: ${{ matrix.config.name }}
    permissions:
      contents: read
    runs-on: ${{ matrix.config.os }}
    strategy:
      matrix:
        config:
          - { name: "ubuntu-latest", os: ubuntu-latest, cmake_extra: "" }
          - { name: "windows-latest", os: windows-latest, cmake_extra: "-T v143" }
          - { name: "macos-latest", os: macos-latest, cmake_extra: "" }
      fail-fast: false

    steps:
      - uses: actions/checkout@v7

      - name: CMake version
        run: cmake --version

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build ${{ matrix.config.cmake_extra }} -DCMAKE_INSTALL_PREFIX=${PWD}/build/install -DCPACK_PACKAGE_DIRECTORY=${PWD}/build/package -DCPACK_DEBIAN_PACKAGE_SHLIBDEPS=ON

      - name: Make
        run: cmake --build build --config Release -j

      - name: Install
        run: cmake --build build --config Release -j --target install

      - name: Package
        run: cmake --build build --config Release -j --target package

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: pkg-${{ matrix.config.name }}
          path: |
            build/package/*.deb
            build/package/*.tar.bz2
            build/package/*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate tag format
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match the required vX.Y.Z format"
            exit 1
          fi

      - name: Download Artifacts
        uses: actions/download-artifact@v8

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: "pkg-*/*"
